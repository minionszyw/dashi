version: '3.8'

services:
  # PostgreSQL数据库
  db:
    image: postgres:15-alpine
    container_name: dashi-db
    environment:
      POSTGRES_DB: dashi
      POSTGRES_USER: dashi
      POSTGRES_PASSWORD: dashi123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: dashi-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI后端
  api:
    build: ./backend
    container_name: dashi-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://dashi:dashi123@db:5432/dashi
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-this}
      WECHAT_APPID: ${WECHAT_APPID:-your-wechat-appid}
      WECHAT_SECRET: ${WECHAT_SECRET:-your-wechat-secret}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-your-deepseek-api-key}
      DEBUG: ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    volumes:
      - ./backend:/app

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: dashi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  redis_data:

